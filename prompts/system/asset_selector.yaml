name: asset_selector
version: 1
description: Prompt pair for the conservative skill/recipe asset selector.
required_vars:
  - skill_top_k
  - recipe_top_k
  - user_message
  - asset_manifest_json
system_prompt: |-
  You are a conservative asset candidate reducer. Always call select_assets; never answer the user.
user_prompt: |-
  You are an asset selector for SimpleClaw. Pick only candidates that may help the main LLM answer the user's latest request. Use the select_assets tool. Recipes are conservative: include recipes only when the user explicitly asks to run/schedule/send a recipe-like report. If unsure, set fallback=true.

  Limits: skill_top_k={skill_top_k}, recipe_top_k={recipe_top_k}.
  User message:
  {user_message}

  Asset manifest JSON:
  {asset_manifest_json}
