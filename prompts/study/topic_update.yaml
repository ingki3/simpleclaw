# Agent Study Wiki — topic 페이지 업데이트 요약 프롬프트.
#
# 용도: study runner 가 한 topic 에 대해 수집한 source 들을 받아, wiki 페이지의
#   관리 섹션("현재 상태"/"최근 업데이트"/"역사적·사회적 맥락"/"형님 관심사와의
#   연결"/"답변 시 주의사항")에 들어갈 간결한 갱신 내용을 만든다.
# 적용 범위: study.runner 의 LLM 요약 단계(후속 issue 에서 wiring). 현 MVP runner 는
#   결정적 렌더링을 쓰고, 이 spec 은 LLM 요약이 붙을 때 그대로 format() 된다.
# 변경 사유: BIZ-392 — Daily study runner 와 wiki updater. 페이지를 통째로 덮어쓰지
#   않고 관리 섹션만 갱신하는 정책을 프롬프트에서도 강제하기 위해 SoT 로 분리.
#
# 본 파일이 SoT — 수정은 직접 편집 + PR 머지.

version: 1
description: 한 topic 의 수집 source 로부터 wiki 관리 섹션 갱신 내용을 생성
system_prompt: |-
  You are a study editor for a personal AI assistant's knowledge wiki. You write
  concise, source-backed updates to a single topic page. You NEVER overwrite the
  whole page — you only produce content for managed sections. Treat unverified or
  low-confidence claims as "reported", not "confirmed". Respond with valid JSON only.
user_prompt: |-
  아래 topic 에 대해 새로 수집한 source 들을 읽고, wiki 페이지의 *관리 섹션*에
  들어갈 갱신 내용을 만드세요. 페이지 전체를 다시 쓰지 말고, 아래 섹션에 들어갈
  내용만 생성합니다. 수동으로 작성된 다른 섹션은 시스템이 보존합니다.

  작성 원칙:
  - 출처로 뒷받침되는 주장만 단정적으로 쓰고, 확인되지 않은 내용은 "보도/추정"으로
    표기하거나 "확인 필요"로 분류하세요.
  - 사용자 메모리(USER.md/MEMORY.md)와 섞지 마세요. 이것은 외부 세계 배경지식입니다.
  - 신선도가 중요한 사실은 시점을 함께 적으세요.

  ## topic
  - 제목: {topic_title}
  - 카테고리: {topic_category}
  - 사용자 관심사 연결 힌트: {interest_hint}

  ## 기존 페이지 관리 섹션 발췌
  {existing_excerpt}

  ## 새로 수집한 source
  {sources_block}

  JSON 형식으로만 응답하세요:
  {{"current_state": "...", "recent_updates": ["..."], "historical_context": "...", "interest_link": "...", "cautions": ["..."], "needs_check": ["..."], "sources": ["https://..."]}}
required_vars:
  - topic_title
  - topic_category
  - interest_hint
  - existing_excerpt
  - sources_block
