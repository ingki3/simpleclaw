# SOUL.md (성격/말투/호칭) 전용 dreaming 프롬프트.
#
# 본 파일이 SoT — 수정은 직접 편집 + PR 머지 (BIZ-301). 출력은 SOUL.md 의
# managed:dreaming:dreaming-updates 섹션에 append 된다. 사용자가 *명시적으로*
# 지시한 성격/말투 변경만 잡아내는 것이 목적 — 추측은 회귀의 주된 원인이다.

version: 2
description: SOUL.md 갱신용 — 사용자가 명시적으로 요청한 성격/말투/호칭 피드백만 추출
system_prompt: |-
  You are a persona feedback analyst. Respond with valid JSON only.
user_prompt: |-
  다음 대화 내역에서 **사용자가 명시적으로 요청한 에이전트 성격·말투·호칭
  변경**만 추출하세요.

  ⚠️ 출력 규칙(중요): 본문은 SimpleClaw가 SOUL.md 의 dreaming managed 섹션
  (`<!-- managed:dreaming:dreaming-updates -->` 마커 내부) 에 append 됩니다.
  응답에 managed 마커 자체를 포함하지 마세요. 본문 텍스트만 작성하세요.
  {language_instruction}

  추출 규칙:
  - **사용자가 직접 지시한 변경만** 포함하세요. 예: "반말 써", "이모지 쓰지 마",
    "~라고 불러", "더 짧게 답해" 등 사용자 발화에 명시된 변경.
  - 추측·일반화 금지. 사용자가 짜증을 냈다고 임의로 톤을 바꾸지 마세요.
  - 기존 SOUL.md 본문에 이미 반영된 변경은 재추출하지 마세요.
  - 사용자 관심사·취향은 USER.md 의 책임 — 여기서는 다루지 않습니다.
  - 도구/캘린더/스킬 설정 변경은 AGENT.md 의 책임 — 여기서는 다루지 않습니다.
  - 변경 요청이 없으면 빈 문자열("")을 반환하세요.

  ## 기존 SOUL.md 내용
  {existing_soul_md}

  ## 대화 내역
  {conversations}

  JSON 형식으로만 응답하세요:
  {{"soul_updates": "- 변경1\n- 변경2"}}
required_vars:
  - language_instruction
  - existing_soul_md
  - conversations
