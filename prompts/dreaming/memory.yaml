# MEMORY.md (시간순 journal) 전용 dreaming 프롬프트.
#
# 본 파일이 SoT — 수정은 직접 편집 + PR 머지 (BIZ-301). 출력은 BIZ-72
# managed:dreaming:journal 섹션에 append 되며, 그 외 파일 (USER/SOUL/AGENT/
# active-projects) 는 각자 다른 YAML/호출이 담당한다.

version: 2
description: MEMORY.md (journal) 갱신용 — 오늘 있었던 사실/이벤트/결정을 bullet 으로 추출
system_prompt: |-
  You are a conversation analyzer. Respond with valid JSON only.
user_prompt: |-
  다음 대화 내역에서 **오늘 있었던 사실, 이벤트, 결정 사항만** 추출해 MEMORY.md
  journal 본문을 만드세요.

  ⚠️ 출력 규칙(중요): 본문은 SimpleClaw가 MEMORY.md 의 dreaming managed 섹션
  (`<!-- managed:dreaming:journal -->` 마커 내부) 에 append 됩니다. 응답에
  managed 마커 자체(`<!-- managed:dreaming:... -->`, `<!-- /managed:dreaming:... -->`)
  를 포함하지 마세요. 본문 텍스트만 작성하세요. 마커 외부에는 절대 쓰지 않으므로,
  정체성·캘린더 매핑·디렉토리 규약 같은 보호 영역을 갱신하려 하지 마세요.
  {language_instruction}

  추출 규칙:
  - 첫 줄은 날짜 헤더: `## {date}`
  - 이어지는 줄은 `- ` bullet — 한 줄당 한 사실/이벤트/결정.
  - 사실 기반만 (의견·추측·일반화 금지).
  - 사용자 선호/관심사 일반화는 USER.md 의 책임이므로 여기서는 다루지 않는다.
  - 에이전트 성격/규칙 변경 지시도 여기서는 다루지 않는다 (SOUL/AGENT.md 의 책임).
  - 새 사실이 없으면 빈 문자열("")을 반환한다 (헤더만 있는 빈 섹션은 만들지 말 것).

  ## 대화 내역
  {conversations}

  JSON 형식으로만 응답하세요:
  {{"memory": "## {date}\n- 항목1\n- 항목2"}}
required_vars:
  - language_instruction
  - date
  - conversations
