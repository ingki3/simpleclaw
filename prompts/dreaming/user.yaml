# USER.md insights 전용 dreaming 프롬프트.
#
# 본 파일이 SoT — 수정은 직접 편집 + PR 머지 (BIZ-301). 출력은 USER.md 의
# managed:dreaming:insights 섹션과 InsightStore sidecar (BIZ-73 evidence 추적)
# 두 곳에 모두 흘러간다. MEMORY/SOUL/AGENT/active-projects 는 각자 다른 호출.

version: 2
description: USER.md insights 갱신용 — 사용자에 대해 새로 알게 된 정보(선호/관심/습관) 추출
system_prompt: |-
  You are a user profile analyst. Respond with valid JSON only.
user_prompt: |-
  다음 대화 내역에서 **사용자에 대해 새로 알게 된 정보**(선호도, 관심사, 습관)
  만 추출하세요.

  ⚠️ 출력 규칙(중요): 본문은 SimpleClaw가 USER.md 의 dreaming managed 섹션
  (`<!-- managed:dreaming:insights -->` 마커 내부) 에 append 됩니다. 응답에
  managed 마커 자체(`<!-- managed:dreaming:... -->`, `<!-- /managed:dreaming:... -->`)
  를 포함하지 마세요. 본문 텍스트만 작성하세요. 마커 외부에는 절대 쓰지 않으므로,
  정체성·캘린더 매핑·디렉토리 규약 같은 보호 영역을 갱신하려 하지 마세요.
  {language_instruction}

  추출 규칙:
  - 기존 USER.md 본문에 이미 적힌 정보는 재추출하지 마세요.
  - 추측이 아닌, 대화에서 명확히 드러난 정보만.
  - 민감한 개인정보(비밀번호, 금융정보 등)는 절대 저장하지 마세요.
  - 오늘 있었던 단일 이벤트(사실)는 MEMORY.md 의 책임이므로 여기서는 제외합니다.
  - 사용자가 "이미 끝남", "틀림", "더 이상 관심 없음", "모니터링 대상 아님"
    처럼 기존 기억을 정정/부정하면, 기존 관심사보다 그 정정이 우선합니다.
    종료된 일회성 행사·포럼·경기·공지 일정은 지속 관심사로 일반화하지 마세요.
  - 에이전트 성격/규칙 변경은 SOUL/AGENT.md 의 책임이므로 제외합니다.
  - 활성 프로젝트 목록은 active_projects 호출이 담당하므로 여기서는 다루지 않습니다.

  출력은 두 가지로 동시에 채웁니다:

  1. "user_insights": 사람이 읽는 bullet 텍스트 (`- ` 접두). 없으면 빈 문자열.
  2. "user_insights_meta": 위 user_insights 를 구조화한 객체 배열 (BIZ-73 — 누적
     evidence 추적용).
     - 각 항목 형식: {{"topic": "<3~10자 짧은 한국어 주제 키>", "text": "<bullet 한 줄>"}}
     - topic 은 다음 회차에 같은 주제로 다시 관측될 때 매칭하는 키 — 짧고 일관되게.
       예: "맥북에어 가격 조회" → topic="맥북에어가격", "정치 뉴스 요약" → topic="정치뉴스".
     - text 는 user_insights bullet 과 같은 문장 (접두 "- " 없이).
     - 단발 관측이라도 모두 포함하세요. confidence 는 시스템이 부여합니다.
     - 없으면 빈 배열 [].

  ## 기존 USER.md 내용
  {existing_user_md}

  ## 대화 내역
  {conversations}

  JSON 형식으로만 응답하세요:
  {{"user_insights": "- 새 정보1", "user_insights_meta": [{{"topic": "주제키", "text": "새 정보1"}}]}}
required_vars:
  - language_instruction
  - existing_user_md
  - conversations
