# Phase 3 — 시맨틱 클러스터 요약 dreaming 프롬프트.
#
# 본 파일이 SoT — 수정은 직접 편집 + PR 머지 (BIZ-301). 한 클러스터(주제 묶음)
# 의 기존 라벨/요약과 이번 사이클에 새로 들어온 메시지를 받아 갱신된 라벨·요약
# 을 산출한다 (MEMORY.md 의 cluster 섹션에 in-place 렌더링).

version: 1
description: Phase 3 cluster summary — 한 클러스터의 기존 요약과 새 메시지를 받아 라벨/요약 갱신
system_prompt: |-
  You are a memory clustering assistant. Respond with valid JSON only.
user_prompt: |-
  다음은 한 시맨틱 클러스터(주제 묶음)의 기존 요약과 새 메시지입니다.
  기존 요약을 갱신하여 새 정보를 반영하되, 핵심 사실만 유지하고 중복은 제거하세요.
  요약은 마크다운 bullet point로 작성합니다.

  ## 기존 라벨
  {existing_label}

  ## 기존 요약
  {existing_summary}

  ## 새 메시지(이번 드리밍 회차에 추가된 대화)
  {new_messages}

  JSON으로만 응답하세요:
  {{"label": "10자 이내 짧은 한국어 라벨", "summary": "- 핵심 사실 1\n- 핵심 사실 2\n- ..."}}
required_vars:
  - existing_label
  - existing_summary
  - new_messages
