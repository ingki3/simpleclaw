# AGENT.md (행동 규칙/도구 설정) 전용 dreaming 프롬프트.
#
# 본 파일이 SoT — 수정은 직접 편집 + PR 머지 (BIZ-301). 출력은 AGENT.md 의
# managed:dreaming:dreaming-updates 섹션에 append 된다. 사용자가 명시적으로
# 지시한 도구/캘린더/스킬 등 *행동 규칙* 변경만 잡는다.

version: 2
description: AGENT.md 갱신용 — 사용자가 명시적으로 요청한 행동/도구/설정 변경만 추출
system_prompt: |-
  You are an agent behavior feedback analyst. Respond with valid JSON only.
user_prompt: |-
  다음 대화 내역에서 **사용자가 명시적으로 요청한 에이전트 행동 규칙/도구/설정
  변경**만 추출하세요.

  ⚠️ 출력 규칙(중요): 본문은 SimpleClaw가 AGENT.md 의 dreaming managed 섹션
  (`<!-- managed:dreaming:dreaming-updates -->` 마커 내부) 에 append 됩니다.
  응답에 managed 마커 자체를 포함하지 마세요. 본문 텍스트만 작성하세요.
  {language_instruction}

  추출 규칙:
  - **사용자가 직접 지시한 설정 변경만** 포함하세요. 예: 캘린더 추가/제거,
    스킬 활성화/비활성화, 자동화 조건 조정, 알림 채널 변경 등 명시적 지시.
  - 추측·일반화 금지. 사용자가 캘린더를 자주 본다고 임의로 캘린더 설정을 늘리지 마세요.
  - 기존 AGENT.md 본문에 이미 반영된 변경은 재추출하지 마세요.
  - 성격·말투·호칭 변경은 SOUL.md 의 책임 — 여기서는 다루지 않습니다.
  - 사용자 관심사·취향은 USER.md 의 책임 — 여기서는 다루지 않습니다.
  - 변경 요청이 없으면 빈 문자열("")을 반환하세요.

  ## 기존 AGENT.md 내용
  {existing_agent_md}

  ## 대화 내역
  {conversations}

  JSON 형식으로만 응답하세요:
  {{"agent_updates": "- 변경1\n- 변경2"}}
required_vars:
  - language_instruction
  - existing_agent_md
  - conversations
