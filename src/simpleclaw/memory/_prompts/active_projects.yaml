# BIZ-299 — USER.md active-projects 섹션 전용 dreaming 프롬프트.
#
# 운영자가 ~/.simpleclaw/prompts/dreaming/active_projects.yaml 를 만들면 그쪽이
# 우선한다. 출력은 USER.md 의 managed:dreaming:active-projects 섹션에 in-place
# 렌더링되며, 같은 정보가 active_projects sidecar JSONL 에도 영속된다.

version: 2
description: USER.md active-projects 섹션 갱신용 — 사용자가 현재 집중 중인 프로젝트 엔티티 추출
system_prompt: |-
  You are a project tracker analyst. Respond with valid JSON only.
user_prompt: |-
  다음 대화 내역에서 **사용자가 현재(이번 윈도우 안에서) 집중 중인 "프로젝트"
  엔티티 목록**을 추출하세요.

  ⚠️ 출력 규칙(중요): 본문은 SimpleClaw가 USER.md 의 dreaming managed 섹션
  (`<!-- managed:dreaming:active-projects -->` 마커 내부) 에 in-place 렌더링됩니다.
  응답에 managed 마커 자체를 포함하지 마세요. 마커 외부에는 절대 쓰지 않으므로,
  정체성·캘린더 매핑·디렉토리 규약 같은 보호 영역을 갱신하려 하지 마세요.
  {language_instruction}

  프로젝트 정의:
  - "프로젝트" 는 사용자가 빌드/QA/리서치/운영 등 *명확한 작업 단위*를 가진 대상.
    예: "SimpleClaw", "Multica", "회사 발표 자료".
  - 단순 관심사·뉴스 토픽은 프로젝트가 아닙니다 (그건 USER.md insights 의 책임).
  - 같은 프로젝트는 사이클마다 **동일한 표기**로 일관되게 출력 (대소문자/표기
    바꾸지 말 것 — sidecar 가 name 으로 매칭합니다).

  각 항목 필드:
  - "name": 프로젝트 이름 (사람이 읽는 표기, 예: "SimpleClaw").
  - "role": 사용자의 역할/관계를 한 줄로
    (예: "솔로 빌더 — 메모리 파이프라인 개선", "플랫폼 빌드/QA 운영자").
  - "recent_summary": 이번 윈도우의 최근 활동을 한두 문장으로
    (예: "BIZ-66 평가 후 sub-issue 10건을 분할하고 A·B 머지 리뷰 진행").

  추출 규칙:
  - 윈도우 안에서 활동이 *전혀 없는* 프로젝트는 출력하지 마세요. sidecar 에 보관된
    기존 항목은 시스템이 자동으로 윈도우 외 처리합니다.
  - 기존 USER.md 의 active-projects 섹션을 참고하여 동일 프로젝트의 표기 일관성을
    유지하세요 — name 이 바뀌면 sidecar 에 중복 엔트리가 생깁니다.
  - 식별된 프로젝트가 없으면 빈 배열 []을 반환하세요.

  ## 기존 USER.md 내용
  {existing_user_md}

  ## 대화 내역
  {conversations}

  JSON 형식으로만 응답하세요:
  {{"active_projects": [{{"name": "...", "role": "...", "recent_summary": "..."}}]}}
required_vars:
  - language_instruction
  - existing_user_md
  - conversations
