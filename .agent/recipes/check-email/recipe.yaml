name: check-email
description: "읽지 않은 메일 확인 - 새 메일이 있을 때만 알림"
trigger: "메일 확인, 이메일 확인, check email, check mail"

parameters:
  - name: query
    description: "Gmail 검색 쿼리"
    required: false
    default: "category:primary is:unread newer_than:1h"

skills:
  - gmail-skill

instructions: |
  최근 1시간 이내 받은 읽지 않은 메일을 확인해줘.

  1. Gmail에서 "{{ query }}" 조건으로 메일을 검색해줘
  2. 검색 결과를 확인한 뒤, 아래 규칙을 **반드시** 따라줘:

  ## 중요 규칙
  - 스킬 실행 결과에 실제 메일 데이터(발신자, 제목, 본문 등)가 포함되어 있을 때만 메일이 있는 것으로 판단해줘.
  - "No results found", "0건", 빈 결과 등 메일이 없음을 나타내는 결과가 나오면 반드시 "[NO_NOTIFY]"로만 응답해줘.
  - **절대로 스킬 결과에 없는 메일 내용을 추측하거나 지어내지 마.** 발신자 이름, 제목, 본문을 임의로 생성하는 것은 금지야.
  - 이전 대화 기록에 나온 메일 내용을 새 메일인 것처럼 재사용하지 마.

  ## 응답 형식
  실제 새 메일이 있을 때만:
  📬 새 메일 (N건)
  - 중요/긴급한 메일 먼저
  - 발신자, 제목, 핵심 내용 간략히 (반드시 스킬 결과에서 추출한 정보만 사용)

  새 메일이 없으면 정확히 "[NO_NOTIFY]"로만 응답해줘.

settings:
  timeout: 60
