name: morning-briefing
description: "아침 브리핑 - 읽지 않은 메일과 오늘 일정 요약"
trigger: "아침 브리핑, morning briefing, 브리핑"

parameters:
  - name: date
    description: "대상 날짜"
    required: false
    default: "오늘"

skills:
  - gmail-skill
  - google-calendar-skill

instructions: |
  {{ date }}의 아침 브리핑을 만들어줘.
  1. 읽지 않은 메일을 확인하고
  2. 오늘 일정을 확인하고
  3. 다음 형식으로 요약해줘:

  📬 메일 요약
  - 중요/긴급한 메일 먼저
  - 나머지는 간략히

  📅 오늘 일정
  - 시간순으로 정리

  새 메일이나 일정이 없으면 "특이사항 없음"으로 짧게 알려줘.

settings:
  timeout: 120
