llm:
  default: "claude"
  providers:
    claude:
      type: "api"
      model: "claude-sonnet-4-20250514"
      api_key_env: "ANTHROPIC_API_KEY"
    openai:
      type: "api"
      model: "gpt-4o"
      api_key_env: "OPENAI_API_KEY"
    gemini:
      type: "api"
      model: "gemini-2.0-flash"
      api_key_env: "GOOGLE_API_KEY"

skills:
  local_dir: ".agent/skills"
  global_dir: "~/.agents/skills"
  execution_timeout: 60

mcp:
  servers: {}

daemon:
  heartbeat_interval: 300
  pid_file: ".agent/daemon.pid"
  status_file: ".agent/HEARTBEAT.md"
  db_path: ".agent/daemon.db"
  dreaming:
    overnight_hour: 3
    idle_threshold: 7200
  wait_state:
    default_timeout: 3600

persona:
  token_budget: 4096
  local_dir: ".agent"
  global_dir: "~/.agents/main"
  files:
    - name: "AGENT.md"
      type: "agent"
    - name: "USER.md"
      type: "user"
    - name: "MEMORY.md"
      type: "memory"
