llm:
  default: "gemini"
  providers:
    claude:
      type: "api"
      model: "claude-sonnet-4-20250514"
      api_key_env: "ANTHROPIC_API_KEY"
    openai:
      type: "api"
      model: "gpt-4o"
      api_key_env: "OPENAI_API_KEY"
    gemini:
      type: "api"
      model: "gemini-3.1-flash-lite-preview"
      api_key_env: "GOOGLE_API_KEY"

agent:
  history_limit: 20
  db_path: ".agent/conversations.db"
  max_tool_iterations: 5
  workspace_dir: ".agent/workspace"

security:
  command_guard:
    enabled: true
    allowlist: []
  env_passthrough: []

skills:
  local_dir: ".agent/skills"
  global_dir: "~/.agents/skills"
  execution_timeout: 60

mcp:
  servers: {}

voice:
  stt:
    provider: "openai"
    model: "whisper-1"
    max_duration: 300
  tts:
    provider: "openai"
    model: "tts-1"
    voice: "alloy"
    speed: 1.0
    output_format: "mp3"
    max_text_length: 4096

telegram:
  bot_token_env: "TELEGRAM_BOT_TOKEN"
  whitelist:
    user_ids: [6233568410]
    chat_ids: []

webhook:
  enabled: true
  host: "127.0.0.1"
  port: 8080
  auth_token_env: "WEBHOOK_AUTH_TOKEN"

sub_agents:
  max_concurrent: 3
  default_timeout: 300
  workspace_dir: "workspace/sub_agents"
  cleanup_workspace: false
  default_scope:
    allowed_paths: []
    network: false

daemon:
  heartbeat_interval: 300
  pid_file: ".agent/daemon.pid"
  status_file: ".agent/HEARTBEAT.md"
  db_path: ".agent/daemon.db"
  dreaming:
    overnight_hour: 3
    idle_threshold: 7200
    model: "gemini"
  wait_state:
    default_timeout: 3600

persona:
  token_budget: 4096
  local_dir: ".agent"
  global_dir: "~/.agents/main"
  files:
    - name: "AGENT.md"
      type: "agent"
    - name: "USER.md"
      type: "user"
    - name: "MEMORY.md"
      type: "memory"
