[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
markers = [
    "offline: integration test that does not require external network, API keys, live Telegram, or live daemon",
    "live: test requires live local runtime or operator-controlled environment",
    "external: test requires external network/API",
]
