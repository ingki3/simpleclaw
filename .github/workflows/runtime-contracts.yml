name: Runtime Contracts

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run runtime contract tests
        run: pytest tests/contracts/ -v

      - name: Print test inventory
        if: always()
        run: python scripts/dev/test_inventory.py
