name: Offline Integration

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  offline-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run offline integration tests
        run: pytest tests/integration/ -m "offline" -v
